{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.statefulset.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.statefulset.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  serviceName: {{ .Values.statefulset.name }}
  replicas: {{ .Values.statefulset.replicas }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.statefulset.name }}
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.statefulset.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    
    spec:
      containers:
        -name: {{ .Values.statefulset.name }}
         image: "{{ .Values.statefulset.image.repository }}:{{ .Values.statefulset.image.tag }}"
         imagePullPolicy: {{ .Values.statefulset.image.pullPolicy }}
         
         ports:
           - name: {{ .Values.statefulset.name }}
           containerPort: {{ .Values.statefulset.containerPort }}
         
         env:
{{- range $key, $value := .Values.statefulset.env }}
           - name: {{ $key }}
             value: {{ $value | quote }}
{{- end }}
         
{{- if .Values.pvc.enabled }}
         volumeMounts:
           - name: {{ .Values.statefulset.name }}-pvc
             mountPath: {{ .Values.pvc.mountPath }}
{{- end }}

{{- if .Values.statefulset.pvc.enabled }}
      volumes:
        - name: {{ .Values.statefulset.name }}-pvc
          persistentVolumeClaim:
            claimName: {{ .Values.statefulset.pvc.claimName }}
{{- end }}
        
{{- end }}